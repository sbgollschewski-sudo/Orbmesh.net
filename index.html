// ABSTRACTION LAYER — mask internal details for public view
// ══════════════════════════════════════════════════════
const ABSTRACT_MODE = true; // set false for internal/dev view

function abstractData() {
  if (!ABSTRACT_MODE) return;

  // Deterministic hash for consistent node labels across reloads
  function hashId(str) {
    let h = 0x811c9dc5;
    for (let i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 0x01000193);
    }
    return ((h >>> 0) & 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
  }

  // Abstract group labels — keep category-level meaning, strip specifics
  const groupAbstractions = {
    'Canvas Core': 'Core',
    'Brush Pipeline': 'Pipeline A',
    'Render Pipeline': 'Pipeline B',
    'Layer System': 'Layers',
    'Transform': 'Transform',
    'History': 'History',
    'Mercury 3D/2D': 'Dimensional',
    'Dimensional': 'Spatial',
    'Tile & Memory': 'Memory',
    'Canvas Utils': 'Utilities',
    'Serialization': 'Persistence',
    'Selection': 'Selection',
    'Vtable System': 'Dispatch Tables',
    'Block Infrastructure': 'Block Infra',
    'Shared Components · 33': 'Components',
    'N-Graph Visual Shell': 'Visual Shell',
    'Compound Editors': 'Editors',
    'Canvas Graph': 'Graph Overlay',
    'Viewport Overlays': 'Overlays',
    'Agent Canvas': 'Agent Layer',
    'Physical Machines': 'Hardware',
  };

  GROUPS.forEach(group => {
    // Abstract group label — use mapping or strip line counts and keep base name
    if (groupAbstractions[group.label]) {
      group.label = groupAbstractions[group.label];
    } else {
      // Strip line counts like "Viewport — 8.9K" → "Viewport"
      group.label = group.label.replace(/\s*[—·]\s*[\d.,]+K?\+?.*$/, '').trim();
      // Strip "canvas_bridge/ 20.9K" style
      group.label = group.label.replace(/\/\s*[\d.,]+K?/, '').trim();
    }

    // Abstract node labels and descriptions
    group.nodes.forEach(node => {
      const nodeHash = hashId(node.id);
      // Strip file extensions, line counts, specific filenames
      // Replace with hash-based identifier
      if (node.isCat) {
        // Category summary nodes — keep count, abstract names
        const countMatch = node.d.match(/(\d+)\s*(blocks?|modules?)/);
        node.l = node.l; // keep category-level names like "Core Platform"
        node.d = countMatch ? `${countMatch[1]} ${countMatch[2]}` : '';
      } else {
        node.l = nodeHash;
        node.d = '';
      }
    });
  });
}
abstractData();

// ORBIT CONFIG
// ══════════════════════════════════════════════════════
function getRing(r) {
  if (r < 50) return 0;
  if (r < 550) return 1;
  if (r < 800) return 2;
  if (r < 1100) return 3;
  if (r < 1400) return 4;
  if (r < 1700) return 5;
  return 6;
}
// Orbit periods in seconds — lower = faster. Inner rings orbit faster, outer rings slower
const ORBIT_SPEEDS = [0, 80, 110, 150, 200, 260, 330];
const ORBIT_DIRS   = [0,   1,  -1,   1,  -1,    1,   -1];

// Elevated band: same direction, 40% of base speed → drifts relative to base
const ELEVATED_SPEED_FACTOR = 0.4;

// Groups assigned to the elevated (slower) band per ring — by family
// Rings 0-2 (core) stay solid — no elevation split
const HARDCODED_ELEVATED = [
  'vtables', 'otherbridges',
  'lifecycle', 'gates', 'dispatch',
  'editors', 'ngraph', 'annotation', 'dialogs', 'components', 'agentcanvas',
  'python', 'proto', 'hardware', 'macros',
];
let ELEVATED_GROUPS = new Set(HARDCODED_ELEVATED);

// ══════════════════════════════════════════════════════
// LAYOUT ENGINE
// ══════════════════════════════════════════════════════
const NODE_W = 145, NODE_H = 28, NODE_PAD = 3;
let nodePos = {};       // id -> {x, y, w, h, cx, cy}
let nodeOrbit = {};     // id -> {ring, elevated}
let nodeColorMap = {};  // id -> color hex
let nodeCatMap = {};    // id -> cat key
let nodeConns = {};     // id -> connection count
let maxConns = 1;       // max connections on any node
let groupBounds = {};
let orbitalRadii = [];

// Per-group mini-orbital layout
let groupCenter = {};       // groupId -> {x, y} (world coords, before ring rotation)
let nodeLocal = {};         // nodeId -> {r, angle, groupId}
let groupOrbitDir = {};     // groupId -> 1 or -1
const _groupTrig = {};     // groupId -> {sin, cos} (per-frame cache)
const MINI_ORBIT_SPEED = 35; // seconds per full revolution at 1x speed
const MINI_RING_RADII = [40, 75, 110, 145, 185];
const MINI_RING_CAPS = [6, 10, 14, 18, 22];

function rebuildLayout() {
  nodePos = {}; nodeOrbit = {}; nodeColorMap = {}; nodeCatMap = {};
  nodeConns = {}; groupBounds = {};

  // Compute connection counts
  CONNECTIONS.forEach(c => {
    nodeConns[c.f] = (nodeConns[c.f] || 0) + 1;
    nodeConns[c.t] = (nodeConns[c.t] || 0) + 1;
  });
  maxConns = Math.max(1, ...Object.values(nodeConns));

  GROUPS.forEach(g => {
    const ring = getRing(_effectiveRadius(g));
    const elevated = ELEVATED_GROUPS.has(g.id);
    g.nodes.forEach(n => {
      nodeOrbit[n.id] = { ring, elevated };
      nodeColorMap[n.id] = (CAT[g.cat] || {color:'#888888'}).color;
      nodeCatMap[n.id] = g.cat;
    });
  });

  layoutAll();
  orbitalRadii = computeOrbitalRadii();
  // Stats updated on data load
}

let _boundaryRadius = 0;  // computed during layout, used by drawBoundary

// Position overrides — move constellations by group id or category
// Group id takes priority over cat. Radius and angle can be overridden independently.
// Use 'opposite: "groupId"' to auto-place 180° opposite another group.
const POSITION_OVERRIDE = {
  qml_components: { r: 1440 },           // UI Kit → one ring inward (ring 4)
  qml_generate:   { r: 740, opposite: 'automation' },  // Generate → same ring as Blocks, opposite side
};

function _effectiveRadius(group) {
  const ov = POSITION_OVERRIDE[group.id] || POSITION_OVERRIDE[group.cat];
  return (ov && ov.r !== undefined) ? ov.r : group.r;
}

function _effectiveAngle(group) {
  const ov = POSITION_OVERRIDE[group.id] || POSITION_OVERRIDE[group.cat];
  if (ov) {
    if (ov.a !== undefined) return ov.a;
    if (ov.opposite) {
      // Find the target group's angle and go 180° opposite
      const target = GROUPS.find(g => g.id === ov.opposite || g.cat === ov.opposite);
      if (target) return (target.a + 180) % 360;
    }
  }
  return group.a;
}

function layoutAll() {
  groupCenter = {}; nodeLocal = {}; groupOrbitDir = {};

  GROUPS.forEach((group, gi) => {
    const r = _effectiveRadius(group);
    const a = _effectiveAngle(group);
    const center = polar(r, a);
    groupCenter[group.id] = { x: center.x, y: center.y };

    // Sort nodes by connection count descending — heaviest becomes primary
    const sorted = [...group.nodes].sort((a, b) =>
      (nodeConns[b.id] || 0) - (nodeConns[a.id] || 0)
    );

    // Alternate CW/CCW per group
    groupOrbitDir[group.id] = (gi % 2 === 0) ? 1 : -1;

    // Primary node (most connections) sits at group center
    group._primaryId = sorted[0].id;
    // Pre-compute display label (stripped + uppercased) for draw-time performance
    group._displayLabel = group.label.replace(/\s*·\s*[\d,]+$/, '').toUpperCase();
    nodeLocal[sorted[0].id] = { r: 0, angle: 0, groupId: group.id };

    // Distribute satellites into concentric mini-rings
    const sats = sorted.slice(1);
    let placed = 0, ringIdx = 0;
    while (placed < sats.length) {
      const cap = MINI_RING_CAPS[Math.min(ringIdx, MINI_RING_CAPS.length - 1)];
      const rad = MINI_RING_RADII[Math.min(ringIdx, MINI_RING_RADII.length - 1)];
      const count = Math.min(cap, sats.length - placed);
      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2 - Math.PI / 2; // start from top
        nodeLocal[sats[placed + i].id] = { r: rad, angle, groupId: group.id, miniRing: ringIdx };
      }
      placed += count;
      ringIdx++;
    }

    // Compute max radius for collision bounds
    const maxR = sats.length > 0 ?
      Math.max(...sats.map(s => nodeLocal[s.id].r)) + 25 : 25;

    // Set nodePos (static positions for w/h and fitAll)
    group.nodes.forEach(node => {
      const loc = nodeLocal[node.id];
      const nx = center.x + loc.r * Math.cos(loc.angle);
      const ny = center.y + loc.r * Math.sin(loc.angle);
      const w = node.isCat ? 155 : NODE_W;
      const h = node.isCat ? 34 : NODE_H;
      nodePos[node.id] = { x: nx - w/2, y: ny - h/2, w, h, cx: nx, cy: ny };
    });

    // Circular group bounds for collision
    const pad = 14;
    groupBounds[group.id] = {
      x: center.x - maxR - pad, y: center.y - maxR - pad,
      w: (maxR + pad) * 2, h: (maxR + pad) * 2,
      cx: center.x, cy: center.y, group, radius: maxR + pad
    };

    group._cx = center.x;
    group._cy = center.y - maxR - 14;
    group._gw = maxR * 2;
    group._gh = maxR * 2;
  });

  resolveCollisions();

  // After collision resolution, update centers and nodePos
  GROUPS.forEach(group => {
    const gb = groupBounds[group.id];
    groupCenter[group.id] = { x: gb.cx, y: gb.cy };

    group.nodes.forEach(node => {
      const loc = nodeLocal[node.id];
      const nx = gb.cx + loc.r * Math.cos(loc.angle);
      const ny = gb.cy + loc.r * Math.sin(loc.angle);
      const w = nodePos[node.id].w, h = nodePos[node.id].h;
      nodePos[node.id] = { x: nx - w/2, y: ny - h/2, w, h, cx: nx, cy: ny };
    });

    const maxR = gb.radius - 14;
    group._cx = gb.cx;
    group._cy = gb.cy - maxR - 14;
  });

  // Compute boundary radius — furthest group edge from center + padding
  let maxBound = 0;
  GROUPS.forEach(g => {
    const gb = groupBounds[g.id];
    if (!gb) return;
    const dx = gb.cx - CX, dy = gb.cy - CY;
    const edgeDist = Math.sqrt(dx * dx + dy * dy) + gb.radius;
    if (edgeDist > maxBound) maxBound = edgeDist;
  });
  _boundaryRadius = maxBound + 80;  // padding beyond outermost satellite
}

function resolveCollisions() {
  const ids = Object.keys(groupBounds);
  for (let pass = 0; pass < 80; pass++) {
    let moved = false;
    for (let i = 0; i < ids.length; i++) {
      for (let j = i + 1; j < ids.length; j++) {
        const a = groupBounds[ids[i]], b = groupBounds[ids[j]];
        const dx = b.cx - a.cx || 0.1, dy = b.cy - a.cy || 0.1;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const minDist = (a.radius || a.w/2) + (b.radius || b.w/2) + 10;
        if (dist >= minDist) continue;
        const overlap = minDist - dist;
        const nx = dx / dist, ny = dy / dist;
        const push = overlap / 2 + 1;
        a.cx -= nx * push; a.cy -= ny * push;
        a.x = a.cx - a.w/2; a.y = a.cy - a.h/2;
        b.cx += nx * push; b.cy += ny * push;
        b.x = b.cx - b.w/2; b.y = b.cy - b.h/2;
        moved = true;
      }
    }
    if (!moved) break;
  }
}

// Compute orbital track radii (unique distances from center)
function computeOrbitalRadii() {
  const radii = new Set();
  GROUPS.forEach(g => {
    if (g.r < 50) return;
    const gb = groupBounds[g.id];
    if (!gb) return;
    const dx = gb.cx - CX, dy = gb.cy - CY;
    const dist = Math.round(Math.sqrt(dx*dx + dy*dy));
    if (dist > 10) radii.add(dist);
  });
  return [...radii];
}

// ── Cached hexToRgba ──
const _rgbaCache = {};
function hexToRgba(hex, a) {
  const key = hex + a;
  let v = _rgbaCache[key];
  if (!v) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    v = `rgba(${r},${g},${b},${a})`;
    _rgbaCache[key] = v;
  }
  return v;
}
// Pre-parsed hex → {r,g,b} for dynamic alpha
const _hexRgb = {};
function hexRgb(hex) {
  let v = _hexRgb[hex];
  if (!v) {
    v = { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
    _hexRgb[hex] = v;
  }
  return v;
}

// ── Viewport culling ──
let vpLeft = 0, vpTop = 0, vpRight = 4000, vpBottom = 4000;
function updateViewportBounds() {

  if (local.r === 0) return { cx: rcx, cy: rcy };

  const baseAngle = _groupTrig[local.groupId];

    const toBright = 0.3 + Math.min((nodeConns[conn.t] || 0) / mc, 1) * 0.7;
    const colorFrom = nodeColorMap[conn.f] || '#666666';
    const colorTo = nodeColorMap[conn.t] || '#666666';
    // Pre-build gradient for this path (avoids creating per-frame)
    const grad = ctx.createLinearGradient(x1, y1, x2, y2);
    const rgb1 = hexRgb(colorFrom), rgb2 = hexRgb(colorTo);
    grad.addColorStop(0, `rgba(${rgb1.r},${rgb1.g},${rgb1.b},${fromBright})`);
    grad.addColorStop(1, `rgba(${rgb2.r},${rgb2.g},${rgb2.b},${toBright * 0.7})`);
    const pathObj = { x1,y1, cp1x,cp1y, cp2x,cp2y, x2,y2,
      colorFrom, colorTo,
      alphaFrom: fromBright, alphaTo: toBright,
      i, proxFactor, dist, grad };
    paths.push(pathObj);
    c2p[i] = pathObj;  // keyed by stable connection index
  });
  _visiblePaths = paths;
  _connToPath = c2p;
  _pathsDirty = false;
  _pathBuildPanX = panX;
  _pathBuildPanY = panY;
  _pathBuildZoom = zoom;

  // Rebuild nodeConnMap: nodeId → [{connIdx, isFrom}] using stable connection indices
  const ncm = {};
  paths.forEach(p => {
    const conn = CONNECTIONS[p.i];
    if (!conn) return;
    if (!ncm[conn.f]) ncm[conn.f] = [];
    if (!ncm[conn.t]) ncm[conn.t] = [];
    ncm[conn.f].push({ connIdx: p.i, isFrom: true });
    ncm[conn.t].push({ connIdx: p.i, isFrom: false });
  });
  _nodeConnMap = ncm;
}

function _viewportDriftedPastOverscan() {
  // Check if viewport has shifted enough in world-space to exceed our overscan buffer
  if (zoom !== _pathBuildZoom) return true;
  const driftX = Math.abs(panX - _pathBuildPanX) / zoom;  // screen px → world px
  const driftY = Math.abs(panY - _pathBuildPanY) / zoom;
  // Rebuild when we've consumed half the overscan buffer
  const overscan = _getOverscan();
  return driftX > overscan * 0.4 || driftY > overscan * 0.4;
}

function drawConnections() {
  // Rebuild paths once positions are ready (no viewport culling — everything always rendered)
  if (_pathsDirty && Object.keys(rotPos).length > 0) {
    _rebuildPaths();
  }
  const paths = _visiblePaths;
  const connToPath = _connToPath;
  const nodeConnMap = _nodeConnMap;

  // Pass 1: Glow — skip at very low zoom; LOD-reduce when zoomed out or in
  if (zoom > 0.12) {
    ctx.lineCap = 'round';
    ctx.setLineDash([]);
    ctx.lineWidth = 6;
    const glowDistCap = zoom > 0.6 ? 1200 / zoom : Infinity;
    // Skip glow on some connections through mid-range (fat 6px strokes, expensive)
    const glowSkip = _zoomRatio < 3 ? Math.max(1, Math.round(3 - _zoomRatio * 0.7)) : 1;
    for (let pi = 0; pi < paths.length; pi++) {
      if (pi % glowSkip !== 0) continue;
      const p = paths[pi];
      if (p.dist > glowDistCap) continue;
      ctx.globalAlpha = 0.12 * p.proxFactor;
      ctx.strokeStyle = p.grad;
      ctx.beginPath();
      ctx.moveTo(p.x1, p.y1);
      ctx.bezierCurveTo(p.cp1x, p.cp1y, p.cp2x, p.cp2y, p.x2, p.y2);
      ctx.stroke();
    }
  }

  // Pass 2: Main lines (all paths, always)
  ctx.lineWidth = 1.4;
  ctx.lineCap = 'round';
  ctx.setLineDash([]);
  for (let pi = 0; pi < paths.length; pi++) {
    const p = paths[pi];
    ctx.globalAlpha = 0.4 * p.proxFactor;
    ctx.strokeStyle = p.grad;
    ctx.beginPath();
    ctx.moveTo(p.x1, p.y1);
    ctx.bezierCurveTo(p.cp1x, p.cp1y, p.cp2x, p.cp2y, p.x2, p.y2);
    ctx.stroke();
  }

  // Pass 3: Random pulses travelling along lines
  // Pulses use stable connIdx (index into CONNECTIONS[]) not path array index
  const now = performance.now() / 1000;
  const dt = _lastPulseFrame ? now - _lastPulseFrame : 0.016;
  _lastPulseFrame = now;

  // Build set of connections that already have an active pulse (anti-stacking)
  const connBusy = new Set();
  for (let i = 0; i < activePulses.length; i++) connBusy.add(activePulses[i].connIdx);

  // Soft spawn throttle: scale down spawn rates as we approach cap
  // LOD: reduce pulse caps through mid-range (gradual taper to full at 5x)
  const pulseLod = _zoomRatio < 5 ? Math.max(0.3, _zoomRatio * 0.2) : 1;
  const SOFT_CAP = Math.round(500 * pulseLod);
  const HARD_CAP = Math.round(700 * pulseLod);
  const spawnThrottle = Math.max(0, 1 - activePulses.length / SOFT_CAP);

  if (paths.length > 0 && spawnThrottle > 0) {
    // Base pulse rate + connection-weighted bursts from hot nodes
    const basePulsesPerSec = Math.min(40, Math.max(3, paths.length * 0.015));
    pulseAccum += basePulsesPerSec * dt * spawnThrottle;

    // Hot node spawning: high-connection nodes pulse to random neighbours
    const mc2 = Math.max(maxConns, 1);
    const hotChecks = Math.min(20, Math.ceil(paths.length * 0.008));
    for (let h = 0; h < hotChecks; h++) {
      const pi = Math.floor(Math.random() * paths.length);
      const p = paths[pi];
      if (connBusy.has(p.i)) continue;  // skip connections with active pulse
      const connRatio = Math.max(p.alphaFrom, p.alphaTo);
      const burstChance = connRatio * connRatio * 8 * dt * spawnThrottle;
      if (Math.random() < burstChance) {
        pulseAccum += 1;
        const fromHot = p.alphaFrom >= p.alphaTo;
        const life = Math.max(PULSE_MIN_LIFE, Math.min(PULSE_MAX_LIFE, p.dist / PULSE_WORLD_SPEED));
        activePulses.push({
          connIdx: p.i,
          t: fromHot ? 0 : 1,
          speed: (fromHot ? 1 : -1) / life,
          life, maxLife: life, gen: 0,
        });
        connBusy.add(p.i);
      }
    }

    // Base random pulses
    while (pulseAccum >= 1) {
      pulseAccum -= 1;
      const pi = Math.floor(Math.random() * paths.length);
      const p = paths[pi];
      if (connBusy.has(p.i)) continue;  // skip busy connections
      const life = Math.max(PULSE_MIN_LIFE, Math.min(PULSE_MAX_LIFE, p.dist / PULSE_WORLD_SPEED));
      const dir = Math.random() > 0.5 ? 1 : -1;
      activePulses.push({
        connIdx: p.i,
        t: dir > 0 ? 0 : 1,
        speed: dir / life,
        life, maxLife: life, gen: 0,
      });
      connBusy.add(p.i);
    }
  }

  // Draw and age pulses — chain reactions on arrival
  const newChainPulses = [];
  ctx.setLineDash([]);
  for (let i = activePulses.length - 1; i >= 0; i--) {
    const pulse = activePulses[i];
    pulse.t += pulse.speed * dt;
    pulse.life -= dt;

    if (pulse.life <= 0 || pulse.t < 0 || pulse.t > 1) {
      // Chain reaction: if pulse arrived at endpoint, maybe spawn children
      const chainThrottle = Math.max(0, 1 - (activePulses.length + newChainPulses.length) / SOFT_CAP);
      if (pulse.gen < MAX_CHAIN_GEN && chainThrottle > 0) {
        const conn = CONNECTIONS[pulse.connIdx];
        if (conn) {
          const arrivedAt = pulse.speed > 0 ? conn.t : conn.f;
          const neighbors = nodeConnMap[arrivedAt];
          // Skip chain reactions on corridor nodes (<=2 connections) to prevent ping-pong
          if (neighbors && neighbors.length > 2) {
            const prob = CHAIN_PROB * Math.pow(CHAIN_DECAY, pulse.gen) * chainThrottle;
            const maxChildren = Math.random() < 0.3 ? 2 : 1;
            let spawned = 0;
            for (let n = 0; n < neighbors.length && spawned < maxChildren; n++) {
              const pick = neighbors[Math.floor(Math.random() * neighbors.length)];
              if (pick.connIdx === pulse.connIdx) continue; // don't echo back
              if (connBusy.has(pick.connIdx)) continue;     // don't stack on busy connection
              if (Math.random() > prob) continue;
              const childPath = connToPath[pick.connIdx];
              if (!childPath) continue;
              const life = Math.max(PULSE_MIN_LIFE, Math.min(PULSE_MAX_LIFE, childPath.dist / PULSE_WORLD_SPEED));
              const dir = pick.isFrom ? 1 : -1;
              newChainPulses.push({
                connIdx: pick.connIdx,
                t: pick.isFrom ? 0 : 1,
                speed: dir / life,
                life, maxLife: life,
                gen: pulse.gen + 1,
              });
              connBusy.add(pick.connIdx);  // mark busy immediately
              spawned++;
            }
          }
        }
      }
      activePulses.splice(i, 1);
      continue;
    }

    // Look up current path geometry for this pulse's connection (stable across rebuilds)
    const p = connToPath[pulse.connIdx];
    if (!p) { activePulses.splice(i, 1); continue; }

    const pos = bezierPoint(p, pulse.t);
    if (!inView(pos.x, pos.y, 20)) continue;

    // Brightness envelope: fade in/out at edges, peak in middle
    const lifeRatio = pulse.life / pulse.maxLife;
    const envelope = Math.sin(lifeRatio * Math.PI);
    const col = lerpColor(p, pulse.t);
    const genFade = Math.pow(0.7, pulse.gen || 0);
    const alpha = envelope * 0.35 * p.proxFactor * genFade;

    // Glow
    ctx.globalAlpha = alpha * 0.3;
    ctx.fillStyle = `rgb(${col.r},${col.g},${col.b})`;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 5, 0, Math.PI * 2);
    ctx.fill();

    // Core dot
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Push chain reaction children
  for (let c = 0; c < newChainPulses.length; c++) activePulses.push(newChainPulses[c]);

  // Gentle cap — only hard-trim if way over (shouldn't happen with soft throttle)
  if (activePulses.length > HARD_CAP) activePulses.length = HARD_CAP;

  ctx.globalAlpha = 1;
  ctx.setLineDash([]);
}

// ── Group labels (category names above orbital clusters) ──
function drawGroupLabels() {
  if (!showLabels) return;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.font = '500 9px -apple-system, BlinkMacSystemFont, sans-serif';
  GROUPS.forEach(group => {
    if (!group._primaryId) return;
    const cat = CAT[group.cat];
    if (!cat) return;
    const pos = rotPos[group._primaryId];
    if (!pos || !inView(pos.cx, pos.cy, 250)) return;
    const gb = groupBounds[group.id];
    const clusterR = gb ? gb.radius : 25;
    ctx.fillStyle = hexToRgba(cat.color, 0.4);
    ctx.fillText(group._displayLabel, pos.cx, pos.cy - clusterR - 4);
  });
}

// ── Cached sphere sprites ──
// Pre-render sphere+glow into offscreen canvases keyed by (color, sizeClass)
const _sphereCache = {};
const SPHERE_SIZE_CLASSES = 8; // quantize sphere sizes to reduce cache entries
function getSphereSprite(colorHex, sr, connRatio) {
  // Quantize sr to reduce unique sprites
  const sizeClass = Math.round(sr * 2); // half-pixel resolution
  const key = colorHex + '|' + sizeClass + '|' + Math.round(connRatio * 4);
  let sprite = _sphereCache[key];
  if (sprite) return sprite;

  const glowRadius = sr * (3 + connRatio * 2);
  const size = Math.ceil(glowRadius * 2 + 2);
  const oc = document.createElement('canvas');
  oc.width = size; oc.height = size;
  const ox = oc.getContext('2d');
  const cx = size / 2, cy = size / 2;

  // Glow halo
  const glowAlpha = 0.1 + connRatio * 0.3;
  const glow = ox.createRadialGradient(cx, cy, sr * 0.5, cx, cy, glowRadius);
  glow.addColorStop(0, hexToRgba(colorHex, glowAlpha));
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ox.fillStyle = glow;
  ox.beginPath();
  ox.arc(cx, cy, glowRadius, 0, Math.PI * 2);
  ox.fill();

  // Sphere body
  const sphere = ox.createRadialGradient(cx - sr*0.3, cy - sr*0.3, 0, cx, cy, sr);
  const coreWhite = 0.5 + connRatio * 0.4;
  sphere.addColorStop(0, `rgba(255,255,255,${coreWhite})`);
  sphere.addColorStop(0.3, hexToRgba(colorHex, 0.5 + connRatio * 0.3));
  sphere.addColorStop(1, hexToRgba(colorHex, 0.2 + connRatio * 0.3));
  ox.fillStyle = sphere;
  ox.beginPath();
  ox.arc(cx, cy, sr, 0, Math.PI * 2);
  ox.fill();

  sprite = { canvas: oc, size, half: size / 2 };
  _sphereCache[key] = sprite;
  return sprite;
}

// Invalidate sphere cache when data changes
function clearSphereCache() {
  for (const k in _sphereCache) delete _sphereCache[k];
  _coreGlowG1 = null; // invalidate cached glow gradients
}

// ── Nodes ──

function drawNodes() {
  GROUPS.forEach(group => {
    const cat = CAT[group.cat] || {color:'#888888',label:'?'};

    group.nodes.forEach(node => {
      const base = nodePos[node.id];
      const pos = rotPos[node.id];
      if (!pos) return;

      // Viewport culling — skip nodes fully offscreen
      if (!inView(pos.cx, pos.cy, 60)) return;

      // Connection-based brightness + viewport proximity boost
      const conns = nodeConns[node.id] || 0;
      const connRatio = Math.min(conns / Math.max(maxConns, 1), 1);
      const sr = node.isCat ? 8 : 2 + Math.sqrt(connRatio) * 10;
      const connAlpha = 0.35 + connRatio * 0.65;
      const vcx = (vpLeft + vpRight) * 0.5, vcy = (vpTop + vpBottom) * 0.5;
      const ndx = pos.cx - vcx, ndy = pos.cy - vcy;
      const ndist = Math.sqrt(ndx * ndx + ndy * ndy);
      const proxBoost = Math.max(0.4, 1.0 - Math.min(ndist / 1500, 0.6));
      ctx.globalAlpha = connAlpha * proxBoost;
      const sprite = getSphereSprite(cat.color, sr, connRatio);
      ctx.drawImage(sprite.canvas, pos.cx - sprite.half, pos.cy - sprite.half);
      ctx.globalAlpha = 1;
    });
  });
}

// ── TV fuzz noise tiles (small, tiled with random offset for animation) ──
const FUZZ_TILE = 256;
const FUZZ_FRAMES = 4; // pre-bake a few frames, cycle through them
let _fuzzDarkTiles = null;  // dark blue fuzz (below nodes)
let _fuzzLightTiles = null; // light blue fuzz (above nodes)

function _buildFuzzTiles() {
  _fuzzDarkTiles = [];
  _fuzzLightTiles = [];
  for (let f = 0; f < FUZZ_FRAMES; f++) {
    // Dark tile — dark blue noise
    const dCv = document.createElement('canvas');
    dCv.width = FUZZ_TILE; dCv.height = FUZZ_TILE;
    const dc = dCv.getContext('2d');
    const dImg = dc.createImageData(FUZZ_TILE, FUZZ_TILE);
    const dd = dImg.data;
    for (let i = 0; i < dd.length; i += 4) {
      dd[i] = 15 + Math.floor(Math.random() * 25);    // R: dark
      dd[i+1] = 20 + Math.floor(Math.random() * 30);  // G: slightly more
      dd[i+2] = 40 + Math.floor(Math.random() * 50);  // B: blue-heavy
      dd[i+3] = Math.floor(Math.random() * 30);        // low random alpha
    }
    dc.putImageData(dImg, 0, 0);
    _fuzzDarkTiles.push(dCv);

    // Light tile — brighter blue noise
    const lCv = document.createElement('canvas');
    lCv.width = FUZZ_TILE; lCv.height = FUZZ_TILE;
    const lc = lCv.getContext('2d');
    const lImg = lc.createImageData(FUZZ_TILE, FUZZ_TILE);
    const ld = lImg.data;
    for (let i = 0; i < ld.length; i += 4) {
      ld[i] = 80 + Math.floor(Math.random() * 40);     // R
      ld[i+1] = 100 + Math.floor(Math.random() * 50);  // G
      ld[i+2] = 160 + Math.floor(Math.random() * 60);  // B: blue-dominant
      ld[i+3] = Math.floor(Math.random() * 20);         // very low alpha
    }
    lc.putImageData(lImg, 0, 0);
    _fuzzLightTiles.push(lCv);
  }
}

let _fuzzFrame = 0;
let _fuzzLastSwap = 0;
const FUZZ_SWAP_MS = 80; // swap tile every ~80ms for flicker
let _fuzzComposite = null; // pre-composited clipped fuzz canvas
let _fuzzCompositeR = 0;   // radius it was built for

// ── Circuit pattern overlay (cached offscreen) ──
let _circuitCanvas = null;
let _circuitMasked = null;
let _circuitRadius = 0;

function _buildCircuitPattern(r) {
  const size = Math.ceil(r * 2 + 4);
  const cv = document.createElement('canvas');
  cv.width = size; cv.height = size;
  const cx = size / 2, cy = size / 2;
  const c = cv.getContext('2d');

  // Seeded pseudo-random for deterministic pattern
  let _seed = 42;
  function srand() { _seed = (_seed * 16807 + 0) % 2147483647; return (_seed & 0x7fffffff) / 0x7fffffff; }

  // Generate concentric ring layers — more rings near the edge
  const ringCount = 28;
  const rings = [];
  for (let i = 0; i < ringCount; i++) {
    // Quadratic distribution — bunched toward the rim
    const t = (i + 1) / ringCount;
    const ringR = r * (0.12 + 0.86 * t * t);
    rings.push(ringR);
  }

  // For each ring, generate broken arc segments
  const segments = []; // {ringR, startAngle, endAngle}
  const junctions = []; // {x, y, ringIdx}

  for (let ri = 0; ri < rings.length; ri++) {
    const ringR = rings[ri];
    const density = 0.3 + 0.7 * (ringR / r); // denser at edge
    const numSegs = Math.floor(6 + 18 * density * (0.7 + srand() * 0.3));
    const segStep = (Math.PI * 2) / numSegs;

    let angle = srand() * Math.PI * 2; // random start offset
    for (let s = 0; s < numSegs; s++) {
      if (srand() < density * 0.7) { // probability of segment existing
        const segLen = segStep * (0.3 + srand() * 0.5);
        segments.push({ ringR, a0: angle, a1: angle + segLen, ri });
        // Junction at start
        junctions.push({ x: cx + Math.cos(angle) * ringR, y: cy + Math.sin(angle) * ringR, ri });
        // Junction at end
        junctions.push({ x: cx + Math.cos(angle + segLen) * ringR, y: cy + Math.sin(angle + segLen) * ringR, ri });
      }
      angle += segStep;
    }
  }

  // Radial connectors between adjacent rings
  const radials = [];
  const radialCount = 60;
  for (let i = 0; i < radialCount; i++) {
    const angle = srand() * Math.PI * 2;
    const ri0 = Math.floor(srand() * (rings.length - 1));
    const ri1 = ri0 + 1 + Math.floor(srand() * Math.min(2, rings.length - ri0 - 1));
    if (ri1 >= rings.length) continue;
    const density = 0.3 + 0.7 * (rings[ri0] / r);
    if (srand() > density * 0.6) continue;
    radials.push({ angle, r0: rings[ri0], r1: rings[Math.min(ri1, rings.length - 1)] });
    junctions.push({ x: cx + Math.cos(angle) * rings[ri0], y: cy + Math.sin(angle) * rings[ri0], ri: ri0 });
    junctions.push({ x: cx + Math.cos(angle) * rings[ri1], y: cy + Math.sin(angle) * rings[ri1], ri: ri1 });
  }

  // Small T-branch stubs off some radials
  const stubs = [];
  for (const rad of radials) {
    if (srand() < 0.4) {
      const stubR = rad.r0 + (rad.r1 - rad.r0) * (0.3 + srand() * 0.4);
      const stubLen = (10 + srand() * 20) * (stubR / r);
      const dir = srand() < 0.5 ? 1 : -1;
      stubs.push({ cx: cx + Math.cos(rad.angle) * stubR, cy: cy + Math.sin(rad.angle) * stubR,
                    ex: cx + Math.cos(rad.angle + dir * stubLen / stubR) * stubR,
                    ey: cy + Math.sin(rad.angle + dir * stubLen / stubR) * stubR });
    }
  }

  // Draw in muted blue — opacity masking happens at composite time
  c.strokeStyle = '#3a5a9e';
  c.lineCap = 'round';

  // Arc segments
  c.lineWidth = 0.8;
  for (const seg of segments) {
    c.beginPath();
    c.arc(cx, cy, seg.ringR, seg.a0, seg.a1);
    c.stroke();
  }

  // Radial connectors
  c.lineWidth = 0.6;
  for (const rad of radials) {
    c.beginPath();
    c.moveTo(cx + Math.cos(rad.angle) * rad.r0, cy + Math.sin(rad.angle) * rad.r0);
    c.lineTo(cx + Math.cos(rad.angle) * rad.r1, cy + Math.sin(rad.angle) * rad.r1);
    c.stroke();
  }

  // T-branch stubs
  c.lineWidth = 0.5;
  for (const stub of stubs) {
    c.beginPath();
    c.moveTo(stub.cx, stub.cy);
    c.lineTo(stub.ex, stub.ey);
    c.stroke();
  }

  // Junction dots
  c.fillStyle = '#3a5a9e';
  for (const j of junctions) {
    // Only draw some junctions (too many = noise)
    if (srand() > 0.35) continue;
    const dotR = 0.8 + srand() * 1.2;
    c.beginPath();
    c.arc(j.x, j.y, dotR, 0, Math.PI * 2);
    c.fill();
  }

  return cv;
}

// ── TV fuzz drawing ──
function _buildFuzzComposite(frameNow) {
  if (!_fuzzLightTiles) _buildFuzzTiles();
  const tile = _fuzzLightTiles[_fuzzFrame];
  if (!tile) return;
  const r = _boundaryRadius;
  if (r < 10) return; // no layout yet
  const size = r * 2 + 4;
  if (!_fuzzComposite || _fuzzComposite.width !== size) {
    _fuzzComposite = document.createElement('canvas');
    _fuzzComposite.width = size;
    _fuzzComposite.height = size;
  }
  const fc = _fuzzComposite.getContext('2d');
  fc.clearRect(0, 0, size, size);
  // Clip to circle
  fc.save();
  fc.beginPath();
  fc.arc(size / 2, size / 2, r - 2, 0, Math.PI * 2);
  fc.clip();
  // Tile with offset
  const ox = ((frameNow * 0.08) | 0) % FUZZ_TILE;
  const oy = ((frameNow * 0.045) | 0) % FUZZ_TILE;
  for (let y = -FUZZ_TILE + oy; y < size + FUZZ_TILE; y += FUZZ_TILE) {
    for (let x = -FUZZ_TILE + ox; x < size + FUZZ_TILE; x += FUZZ_TILE) {
      fc.drawImage(tile, x, y);
    }
  }
  fc.restore();
  _fuzzCompositeR = r;
}

function drawFuzz() {
  if (_boundaryRadius < 100 || !_fuzzComposite) return;
  ctx.globalAlpha = 0.12;
  ctx.drawImage(_fuzzComposite, CX - _fuzzCompositeR - 2, CY - _fuzzCompositeR - 2);
  ctx.globalAlpha = 1;
}

function advanceFuzz(frameNow) {
  if (!_fuzzDarkTiles) _buildFuzzTiles();
  const swapped = frameNow - _fuzzLastSwap > FUZZ_SWAP_MS;
  const radiusChanged = Math.abs(_fuzzCompositeR - _boundaryRadius) > 20;
  if (swapped || radiusChanged || !_fuzzComposite) {
    if (swapped) {
      _fuzzFrame = (_fuzzFrame + 1) % FUZZ_FRAMES;
      _fuzzLastSwap = frameNow;
    }
    _buildFuzzComposite(frameNow);
  }
}

// ── Blue tint overlay — one smooth gradient, transparent at center, dark blue at edge ──
function drawBlueTint() {
  if (_boundaryRadius < 100) return;
  if (!_cachedBlueTint || Math.abs(_boundaryGradR - _boundaryRadius) > 20) _rebuildBoundaryGradients(_boundaryRadius);
  ctx.fillStyle = _cachedBlueTint;
  ctx.beginPath();
  ctx.arc(CX, CY, _boundaryRadius, 0, Math.PI * 2);
  ctx.fill();
}

// ── Dark underglow arch — renders BELOW nodes ──

function drawBoundaryUnderglow() {
  if (_boundaryRadius < 100) return;
  const r = _boundaryRadius;

  ctx.save();
  // Clip to sphere
  ctx.beginPath();
  ctx.arc(CX, CY, r, 0, Math.PI * 2);
  ctx.clip();

  // Dark pointed curved arch — bottom-right quadrant
  // Multiple layered arcs from very wide/faint to narrow/darker, creating depth
  const archAngle = Math.PI * 0.22;  // bottom-right origin
  const archSweep = Math.PI * 0.38;  // arc length

  const layers = [
    // outermost — wide diffuse shadow
    { rFrac: 0.92, width: r * 0.30, alpha: 0.06, taper: 0.7 },
    { rFrac: 0.85, width: r * 0.22, alpha: 0.08, taper: 0.8 },
    { rFrac: 0.80, width: r * 0.16, alpha: 0.10, taper: 0.85 },
    // mid — building density
    { rFrac: 0.88, width: r * 0.10, alpha: 0.12, taper: 0.9 },
    { rFrac: 0.82, width: r * 0.08, alpha: 0.14, taper: 0.92 },
    // inner core of the arch — darkest, narrowest
    { rFrac: 0.86, width: r * 0.05, alpha: 0.16, taper: 0.95 },
  ];

  for (const layer of layers) {
    const arcR = r * layer.rFrac;
    const steps = 6;
    for (let i = 0; i < steps; i++) {
      const t = i / (steps - 1);  // 0→1 across width
      const offsetR = arcR + (t - 0.5) * layer.width;
      // Gaussian falloff across width
      const falloff = Math.exp(-8 * (t - 0.5) * (t - 0.5));
      const lineAlpha = layer.alpha * falloff;
      if (lineAlpha < 0.001) continue;

      // Taper the sweep — narrower at the ends (pointed arch shape)
      const taperAmount = 1.0 - (1.0 - layer.taper) * Math.abs(t - 0.5) * 2;
      const taperSweep = archSweep * taperAmount;
      const taperStart = archAngle + (archSweep - taperSweep) * 0.5;

      ctx.beginPath();
      ctx.arc(CX, CY, offsetR, taperStart, taperStart + taperSweep);
      ctx.strokeStyle = `rgba(4,4,14,${lineAlpha.toFixed(4)})`;
      ctx.lineWidth = layer.width / steps * 2;
      ctx.lineCap = 'round';
      ctx.stroke();
    }
  }

  ctx.restore();
}

// ── Glass orb boundary — sphere illusion with refraction ──
let _cachedVignette = null, _cachedRim = null, _cachedBlueTint = null;
let _boundaryGradR = 0; // radius these were built for

function _rebuildBoundaryGradients(r) {
  _cachedVignette = ctx.createRadialGradient(CX, CY, r * 0.4, CX, CY, r);
  _cachedVignette.addColorStop(0.0,  'rgba(0,0,0,0)');
  _cachedVignette.addColorStop(0.50, 'rgba(0,0,0,0)');
  _cachedVignette.addColorStop(0.60, 'rgba(1,1,3,0.003)');
  _cachedVignette.addColorStop(0.68, 'rgba(1,1,3,0.006)');
  _cachedVignette.addColorStop(0.74, 'rgba(1,1,3,0.012)');
  _cachedVignette.addColorStop(0.80, 'rgba(1,1,3,0.024)');
  _cachedVignette.addColorStop(0.85, 'rgba(1,1,3,0.04)');
  _cachedVignette.addColorStop(0.89, 'rgba(1,1,3,0.065)');
  _cachedVignette.addColorStop(0.92, 'rgba(1,1,3,0.095)');
  _cachedVignette.addColorStop(0.95, 'rgba(1,1,3,0.13)');
  _cachedVignette.addColorStop(0.97, 'rgba(1,1,3,0.17)');
  _cachedVignette.addColorStop(0.99, 'rgba(1,1,3,0.22)');
  _cachedVignette.addColorStop(1.0,  'rgba(1,1,3,0.29)');

  _cachedRim = ctx.createRadialGradient(CX, CY, r - 6, CX, CY, r + 1);
  _cachedRim.addColorStop(0.0,  'rgba(58,90,158,0)');
  _cachedRim.addColorStop(0.3,  'rgba(58,90,158,0)');
  _cachedRim.addColorStop(0.55, 'rgba(58,90,158,0.002)');
  _cachedRim.addColorStop(0.75, 'rgba(58,90,158,0.0045)');
  _cachedRim.addColorStop(0.90, 'rgba(58,90,158,0.0025)');
  _cachedRim.addColorStop(1.0,  'rgba(58,90,158,0)');

  _cachedBlueTint = ctx.createRadialGradient(CX, CY, 0, CX, CY, r);
  _cachedBlueTint.addColorStop(0.0,  'rgba(3,5,12,0)');
  _cachedBlueTint.addColorStop(0.20, 'rgba(3,5,12,0)');
  _cachedBlueTint.addColorStop(0.35, 'rgba(3,5,12,0.0006)');
  _cachedBlueTint.addColorStop(0.50, 'rgba(3,5,12,0.0018)');
  _cachedBlueTint.addColorStop(0.65, 'rgba(3,5,12,0.004)');
  _cachedBlueTint.addColorStop(0.78, 'rgba(3,5,12,0.007)');
  _cachedBlueTint.addColorStop(0.88, 'rgba(3,5,12,0.010)');
  _cachedBlueTint.addColorStop(0.95, 'rgba(3,5,12,0.013)');
  _cachedBlueTint.addColorStop(1.0,  'rgba(3,5,12,0.015)');

  _boundaryGradR = r;
}

function drawBoundary() {
  if (_boundaryRadius < 100) return;
  const r = _boundaryRadius;
  const big = r + 4000;

  // Rebuild cached gradients if radius changed significantly
  if (!_cachedVignette || Math.abs(_boundaryGradR - r) > 20) {
    _rebuildBoundaryGradients(r);
  }

  // Rebuild circuit pattern + masked composite if radius changed
  if (!_circuitCanvas || Math.abs(_circuitRadius - r) > 20) {
    _circuitCanvas = _buildCircuitPattern(r);
    // Pre-bake the masked version
    const cSize = _circuitCanvas.width;
    const cHalf = cSize / 2;
    const maskCv = document.createElement('canvas');
    maskCv.width = cSize; maskCv.height = cSize;
    const mc = maskCv.getContext('2d');
    mc.drawImage(_circuitCanvas, 0, 0);
    // Radial mask — opacity increases toward rim
    mc.globalCompositeOperation = 'destination-in';
    const radMask = mc.createRadialGradient(cHalf, cHalf, 0, cHalf, cHalf, cHalf);
    radMask.addColorStop(0.0,  'rgba(255,255,255,0.0)');
    radMask.addColorStop(0.15, 'rgba(255,255,255,0.0)');
    radMask.addColorStop(0.35, 'rgba(255,255,255,0.01)');
    radMask.addColorStop(0.55, 'rgba(255,255,255,0.03)');
    radMask.addColorStop(0.70, 'rgba(255,255,255,0.06)');
    radMask.addColorStop(0.82, 'rgba(255,255,255,0.10)');
    radMask.addColorStop(0.92, 'rgba(255,255,255,0.16)');
    radMask.addColorStop(1.0,  'rgba(255,255,255,0.22)');
    mc.fillStyle = radMask;
    mc.fillRect(0, 0, cSize, cSize);
    // Angular highlight — bright in upper-left
    mc.globalCompositeOperation = 'lighter';
    const angX = cHalf - cHalf * 0.4, angY = cHalf - cHalf * 0.4;
    const angGrad = mc.createRadialGradient(angX, angY, 0, angX, angY, cHalf * 0.9);
    angGrad.addColorStop(0.0,  'rgba(58,90,158,0.05)');
    angGrad.addColorStop(0.3,  'rgba(58,90,158,0.03)');
    angGrad.addColorStop(0.6,  'rgba(58,90,158,0.01)');
    angGrad.addColorStop(1.0,  'rgba(58,90,158,0.0)');
    mc.fillStyle = angGrad;
    mc.fillRect(0, 0, cSize, cSize);
    _circuitMasked = maskCv;
    _circuitRadius = r;
  }

  ctx.save();

  // 1. Edge vignette — cached gradient
  ctx.fillStyle = _cachedVignette;
  ctx.beginPath();
  ctx.arc(CX, CY, r, 0, Math.PI * 2);
  ctx.fill();

  // 2. (chromatic aberration removed)

  // 2b. Circuit pattern overlay (pre-baked with radial+angular mask)
  if (_circuitMasked) {
    const cHalf = _circuitMasked.width / 2;
    ctx.save();
    ctx.beginPath();
    ctx.arc(CX, CY, r, 0, Math.PI * 2);
    ctx.clip();
    ctx.globalAlpha = 0.22;
    ctx.drawImage(_circuitMasked, CX - cHalf, CY - cHalf);
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // 3. Black mask outside the sphere
  ctx.beginPath();
  ctx.moveTo(CX - big, CY - big);
  ctx.lineTo(CX + big, CY - big);
  ctx.lineTo(CX + big, CY + big);
  ctx.lineTo(CX - big, CY + big);
  ctx.closePath();
  ctx.moveTo(CX + r, CY);
  ctx.arc(CX, CY, r, 0, Math.PI * 2, true);
  ctx.closePath();
  ctx.fillStyle = '#06060c';
  ctx.fill('evenodd');

  // 4. Glass rim — cached gradient
  ctx.fillStyle = _cachedRim;
  ctx.beginPath();
  ctx.arc(CX, CY, r + 1, 0, Math.PI * 2);
  ctx.fill();

  // (specular arcs and caustic arcs removed)

  ctx.restore();
}

// ══════════════════════════════════════════════════════
// PAN & ZOOM
// ══════════════════════════════════════════════════════
let isPanning = false, panStartX = 0, panStartY = 0;

viewportEl.addEventListener('wheel', (e) => {
  e.preventDefault();
  if (e.ctrlKey) {
    const mx = e.clientX - viewportEl.getBoundingClientRect().left;
    const my = e.clientY - viewportEl.getBoundingClientRect().top;
    const oldZoom = zoom;
    zoom = Math.max(_fitZoom, Math.min(3, zoom * (e.deltaY > 0 ? 0.94 : 1.06)));
    panX = mx - (mx - panX) * (zoom / oldZoom);
    panY = my - (my - panY) * (zoom / oldZoom);
  } else {
    panX -= e.deltaX;
    panY -= e.deltaY;
  }
  clampPan();
}, { passive: false });

viewportEl.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  isPanning = true;
  panStartX = e.clientX - panX;
  panStartY = e.clientY - panY;
  viewportEl.classList.add('grabbing');
});
window.addEventListener('mousemove', (e) => {
  if (isPanning) {
    panX = e.clientX - panStartX;
    panY = e.clientY - panStartY;
    clampPan();
    return;
  }
});
window.addEventListener('mouseup', () => { isPanning = false; viewportEl.classList.remove('grabbing'); });

// Touch
let lastTouchDist = 0;
viewportEl.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    isPanning = true;
    panStartX = e.touches[0].clientX - panX;
    panStartY = e.touches[0].clientY - panY;
  } else if (e.touches.length === 2) {
    isPanning = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.sqrt(dx*dx + dy*dy);
  }
}, { passive: false });
viewportEl.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length === 1 && isPanning) {
    panX = e.touches[0].clientX - panStartX;
    panY = e.touches[0].clientY - panStartY;
    clampPan();
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const my = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const oldZoom = zoom;
    zoom = Math.max(_fitZoom, Math.min(3, zoom * (dist / lastTouchDist)));
    const rect = viewportEl.getBoundingClientRect();
    panX = (mx-rect.left) - ((mx-rect.left) - panX) * (zoom / oldZoom);
    panY = (my-rect.top) - ((my-rect.top) - panY) * (zoom / oldZoom);
    clampPan();
    lastTouchDist = dist;
  }
}, { passive: false });
viewportEl.addEventListener('touchend', () => { isPanning = false; });

function toggleLabels() { showLabels = !showLabels; }

function fitAll() {
  const rect = viewportEl.getBoundingClientRect();
  const pad = 60;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  Object.values(nodePos).forEach(p => {
    minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
    maxX = Math.max(maxX, p.x + p.w); maxY = Math.max(maxY, p.y + p.h);
  });
  const worldW = maxX - minX, worldH = maxY - minY;
  zoom = Math.max(0.05, Math.min(1, Math.min((rect.width-pad*2)/worldW, (rect.height-pad*2)/worldH)));
  _fitZoom = zoom; // lock this as the minimum zoom level
  _worldMinX = minX; _worldMinY = minY;
  _worldMaxX = maxX; _worldMaxY = maxY;
  panX = (rect.width - worldW * zoom) / 2 - minX * zoom;
  panY = (rect.height - worldH * zoom) / 2 - minY * zoom;
}

function clampPan() {
  const rect = viewportEl.getBoundingClientRect();
  const pad = 60;
  // World content in screen space
  const screenLeft = panX + _worldMinX * zoom;
  const screenTop  = panY + _worldMinY * zoom;
  const screenRight  = panX + _worldMaxX * zoom;
  const screenBottom = panY + _worldMaxY * zoom;
  const contentW = screenRight - screenLeft;
  const contentH = screenBottom - screenTop;
  // Don't let content slide off screen — keep it within viewport bounds
  if (contentW <= rect.width - pad * 2) {
    // Content fits — center it
    panX = (rect.width - contentW) / 2 - _worldMinX * zoom;
  } else {
    // Content wider than viewport — don't let edges go past padding
    if (screenLeft > pad) panX -= screenLeft - pad;
    if (screenRight < rect.width - pad) panX += (rect.width - pad) - screenRight;
  }
  if (contentH <= rect.height - pad * 2) {
    panY = (rect.height - contentH) / 2 - _worldMinY * zoom;
  } else {
    if (screenTop > pad) panY -= screenTop - pad;
    if (screenBottom < rect.height - pad) panY += (rect.height - pad) - screenBottom;
  }
}

// ══════════════════════════════════════════════════════
// KEYBOARD
// ══════════════════════════════════════════════════════
window.addEventListener('keydown', (e) => {
  if (e.key === 'f' || e.key === 'F') fitAll();
  if (e.key === 'l' || e.key === 'L') toggleLabels();
});

// ══════════════════════════════════════════════════════
// DATA SOURCE — live data auto-loads, hardcoded fallback
// ══════════════════════════════════════════════════════
function applyLiveData(data) {
  GROUPS.length = 0;
  data.groups.forEach(g => GROUPS.push(g));
  CONNECTIONS.length = 0;
  data.connections.forEach(c => CONNECTIONS.push(c));
  if (data.elevatedGroups) ELEVATED_GROUPS = new Set(data.elevatedGroups);
  if (data.categories) Object.assign(CAT, data.categories);
  abstractData(); // mask internal details for public view
  clearSphereCache();
  rebuildLayout();
  _pathsDirty = true; // rebuild connections with new data
  fitAll();
}

// Auto-load: prefer script-tag global, fall back to fetch, then hardcoded
if (window.__ARCHITECTURE_DATA__) {
  applyLiveData(window.__ARCHITECTURE_DATA__);
} else {
  fetch('architecture_data.json?t=' + Date.now())
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(data => { applyLiveData(data); })
    .catch(() => { abstractData(); rebuildLayout(); fitAll(); /* fall back to hardcoded */ });
}

// ══════════════════════════════════════════════════════
// START
// ══════════════════════════════════════════════════════
requestAnimationFrame(render);
</script>
